<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Playground — ysc</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23569cd6'/><text x='16' y='22' font-size='18' font-weight='bold' fill='black' text-anchor='middle'>y</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
nav .logo .hide-mobile { display: inline; }
@media (max-width: 480px) { nav .logo .hide-mobile { display: none; } }

.playground-wrap {
  display: flex;
  gap: var(--space-4);
  min-height: 65vh;
  margin: var(--space-6) 0;
}

.playground-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--surface-1);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.playground-output {
  width: 45%;
  min-width: 360px;
  display: flex;
  flex-direction: column;
  background: var(--surface-1);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.playground-output .output-content {
  flex: 1;
  overflow: auto;
  padding: var(--space-4);
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.6;
  white-space: pre;
  color: var(--text);
}

.playground-output .output-content.is-wrapped {
  white-space: pre-wrap;
}

.playground-bar {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  background: var(--surface-2);
  border-bottom: 1px solid var(--surface-3);
}

.playground-bar .status {
  font-size: 0.8rem;
  color: var(--text-tertiary);
  margin-left: auto;
}

.playground-tabs {
  display: flex;
  background: var(--surface-2);
  border-bottom: 1px solid var(--surface-3);
}

.playground-tab {
  padding: var(--space-2) var(--space-4);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-tertiary);
  border-bottom: 2px solid transparent;
  transition: all var(--transition-fast);
  user-select: none;
}

.playground-tab:hover { color: var(--text-secondary); }
.playground-tab.active { color: var(--brand); border-bottom-color: var(--brand); }

.line-ref { color: var(--green); font-size: 0.75rem; }
.error-text { color: var(--red); }

textarea#source {
  flex: 1;
  background: var(--surface-0);
  color: var(--text);
  border: none;
  padding: var(--space-4);
  font-family: var(--mono);
  font-size: 0.85rem;
  line-height: 1.6;
  resize: none;
  outline: none;
  tab-size: 2;
}

@media (max-width: 768px) {
  .playground-wrap { flex-direction: column; }
  .playground-output { width: 100%; min-height: 300px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <span class="logo-icon">y</span>
    <span class="hide-mobile">ysc</span>
  </a>
  <a href="guide.html">Guide</a>
  <a href="stdlib.html">Stdlib</a>
  <a href="playground.html" class="active">Playground</a>
  <a href="https://github.com/DevYatsu/ysc" class="github">
    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    <span>GitHub</span>
  </a>
</nav>

<div class="container" style="padding-top:var(--space-6);">

<h2 style="margin-bottom:0.5rem;">Playground</h2>
<p style="color:var(--text-secondary);margin-bottom:var(--space-4);">Write ysc code and press <strong>Run</strong> or <strong>Ctrl+Enter</strong>. Switch between Output, AST, and Bytecode.</p>

<div class="playground-wrap">
  <div class="playground-editor">
    <div class="playground-bar">
      <button class="btn btn-primary" id="runBtn" disabled style="padding:4px 16px;font-size:13px;">▶ Run</button>
      <button class="btn btn-ghost" id="resetBtn" style="padding:4px 12px;font-size:13px;">↺ Reset</button>
      <span class="status" id="status">Loading…</span>
    </div>
    <textarea id="source" spellcheck="false"></textarea>
  </div>
  <div class="playground-output">
    <div class="playground-tabs">
      <span class="playground-tab active" id="tabOut">Output</span>
      <span class="playground-tab" id="tabAst">AST</span>
      <span class="playground-tab" id="tabBc">Bytecode</span>
    </div>
    <pre class="output-content" id="output">Welcome to ysc!

Write code and press ▶ Run.</pre>
  </div>
</div>

</div>

<footer>
  <a href="https://github.com/DevYatsu/ysc">ysc</a> — MIT license. Built with Rust. Compiled to WASM.
</footer>

<script type="module">
const $src = document.getElementById('source');
const $out = document.getElementById('output');
const $runBtn = document.getElementById('runBtn');
const $resetBtn = document.getElementById('resetBtn');
const $status = document.getElementById('status');
const $tabOut = document.getElementById('tabOut');
const $tabAst = document.getElementById('tabAst');
const $tabBc = document.getElementById('tabBc');

const DEFAULT = `// ysc — interactive demo

fun fib(n) {
  if n < 2 { ret n }
  else { ret fib(n - 1) + fib(n - 2) }
}

print("fib(10) = " + fib(10))

// Object iteration
obj = {name: "Alice", age: 30, city: "Paris"}
for k in obj {
  print(k + ": " + str(obj[k]))
}

// Range iteration
sum = 0
for i in 0..10 {
  sum = sum + i
}
print("sum 0..9 = " + sum)
`;

$src.value = DEFAULT;
let wasm, currentTab = 'output';

function showTab(tab) {
  currentTab = tab;
  [$tabOut, $tabAst, $tabBc].forEach(t => t.classList.remove('active'));
  if (tab === 'output') $tabOut.classList.add('active');
  if (tab === 'ast') $tabAst.classList.add('active');
  if (tab === 'bytecode') $tabBc.classList.add('active');
  // Bytecode: no wrapping (pre), Output/AST: wrapping (pre-wrap)
  $out.classList.toggle('is-wrapped', tab !== 'bytecode');
}

$tabOut.onclick = () => { showTab('output'); refresh(); };
$tabAst.onclick = () => { showTab('ast'); refresh(); };
$tabBc.onclick = () => { showTab('bytecode'); refresh(); };

function refresh() {
  if (!wasm) return;
  try {
    if (currentTab === 'output') runCode($src.value);
    else if (currentTab === 'ast') showAst($src.value);
    else showBytecode($src.value);
  } catch (e) {
    $out.textContent = 'Error: ' + e.message;
  }
}

function escape(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatLine(l) {
  const val = escape(l.value || '');
  if (l.line !== undefined) {
    return '<span class="line-ref">[l.' + l.line + ']</span> ' + val;
  }
  return val;
}

function runCode(src) {
  const r = wasm._eval(src);
  if (r.success) {
    const lines = r.lines || [];
    $out.innerHTML = lines.length ? lines.map(formatLine).join('\n') : '';
  } else {
    let html = '';
    (r.lines || []).forEach(l => { html += formatLine(l) + '\n'; });
    html += '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
    $out.innerHTML = html;
  }
}

function showAst(src) {
  const r = wasm._parseAst(src);
  if (r.success) {
    $out.textContent = JSON.stringify(r.data, null, 2);
  } else {
    $out.innerHTML = '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
  }
}

function showBytecode(src) {
  const r = wasm._disassemble(src);
  if (r.success) {
    let text = '';
    (r.functions || []).forEach(fn => {
      text += '--- fn ' + fn.index + ': ' + fn.name + ' (p=' + fn.params + ', l=' + fn.locals + ') ---\n';
      (fn.instructions || []).forEach((ins, i) => {
        text += '  ' + String(i).padStart(4) + ': ' + ins + '\n';
      });
      text += '\n';
    });
    text += '--- main ---\n';
    (r.main || []).forEach((ins, i) => {
      text += '  ' + String(i).padStart(4) + ': ' + ins + '\n';
    });
    $out.textContent = text;
  } else {
    $out.innerHTML = '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
  }
}

(async () => {
  try {
    const m = await import('./pkg/ys_wasm.js');
    await m.default();
    wasm = m;
    $status.textContent = 'Ready';
    $runBtn.disabled = false;
  } catch (e) {
    $status.textContent = 'Unavailable';
    $out.innerHTML = '<span class="error-text">WASM module not loaded. Run locally or check browser compatibility.\n\n' + escape(e.message) + '</span>';
  }
})();

$runBtn.onclick = () => { showTab('output'); runCode($src.value); };
$resetBtn.onclick = () => { $src.value = DEFAULT; refresh(); };
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); $runBtn.click();
  }
});
</script>
</body>
</html>
